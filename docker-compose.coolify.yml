services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-Korepetycje}
      APP_ENV: production
      APP_KEY: ${APP_KEY:?}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:?}
      APP_LOCALE: ${APP_LOCALE:-pl}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-pl}
      APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-pl_PL}
      LOG_CHANNEL: stderr
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-korepetycje}
      DB_USERNAME: ${DB_USERNAME:-korepetycje}
      DB_PASSWORD: ${DB_PASSWORD:?}
      SESSION_DRIVER: database
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      SESSION_ENCRYPT: ${SESSION_ENCRYPT:-false}
      SESSION_PATH: /
      SESSION_DOMAIN: ${SESSION_DOMAIN:-null}
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-127.0.0.1}
      MAIL_PORT: ${MAIL_PORT:-2525}
      MAIL_USERNAME: ${MAIL_USERNAME:-null}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-null}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Korepetycje}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage/app
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-korepetycje}
      MYSQL_USER: ${DB_USERNAME:-korepetycje}
      MYSQL_PASSWORD: ${DB_PASSWORD:?}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  app-storage:
  mysql-data:

